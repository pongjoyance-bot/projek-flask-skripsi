{% extends "admin/admin_base.html" %}
{% block content %}

<div class="card shadow-sm">
  <div class="card-header bg-light d-flex justify-content-between align-items-center">
    <h5 class="mb-0">Kelola Brand</h5>

    <!-- Tombol Tambah -->
    <button class="btn btn-primary btn-sm"
            data-bs-toggle="modal"
            data-bs-target="#modalTambah">
        + Tambah Brand
    </button>
  </div>

  <div class="card-body">

    <div class="table-responsive">
      <table class="table table-bordered table-striped align-middle">
        <thead class="table-dark">
          <tr>
            <th width="60">No</th>
            <th>Nama Brand</th>
            <th width="150">Aksi</th>
          </tr>
        </thead>
        <tbody>
          {% for b in brand %}
          <tr>
            <td>{{ loop.index }}</td>
            <td>{{ b.nama_brand }}</td>
            <td class="text-center">

              <!-- Tombol Edit -->
              <button class="btn btn-warning btn-sm"
                      data-bs-toggle="modal"
                      data-bs-target="#modalEdit{{ b.id_brand }}">
                  <i class="bi bi-pencil"></i>
              </button>

              <!-- Hapus -->
              <form action="{{ url_for('admin_brand_delete', id=b.id_brand) }}"
                    method="POST"
                    style="display:inline;"
                    onsubmit="return confirm('Yakin ingin menghapus brand ini?')">
                  <button class="btn btn-danger btn-sm">
                      <i class="bi bi-trash"></i>
                  </button>
              </form>

            </td>
          </tr>

          <!-- Modal Edit -->
          <div class="modal fade" id="modalEdit{{ b.id_brand }}" tabindex="-1">
            <div class="modal-dialog">
              <div class="modal-content">

                <form method="POST"
                      action="{{ url_for('admin_brand_edit', id=b.id_brand) }}">

                  <div class="modal-header">
                    <h5 class="modal-title">Edit Brand</h5>
                    <button type="button"
                            class="btn-close"
                            data-bs-dismiss="modal"></button>
                  </div>

                  <div class="modal-body">
                    <input type="text"
                           name="nama"
                           class="form-control"
                           value="{{ b.nama_brand }}"
                           required>
                  </div>

                  <div class="modal-footer">
                    <button type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal">Batal</button>
                    <button type="submit"
                            class="btn btn-warning">Update</button>
                  </div>

                </form>

              </div>
            </div>
          </div>

          {% else %}
          <tr>
            <td colspan="3" class="text-center">
              Belum ada data brand.
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>

  </div>
</div>

<!-- Modal Tambah -->
<div class="modal fade" id="modalTambah" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <form method="POST" action="{{ url_for('admin_brand_add') }}">

        <div class="modal-header">
          <h5 class="modal-title">Tambah Brand</h5>
          <button type="button"
                  class="btn-close"
                  data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <input type="text"
                 name="nama"
                 class="form-control"
                 placeholder="Nama Brand"
                 required>
        </div>

        <div class="modal-footer">
          <button type="button"
                  class="btn btn-secondary"
                  data-bs-dismiss="modal">Batal</button>
          <button type="submit"
                  class="btn btn-primary">Simpan</button>
        </div>

      </form>

    </div>
  </div>
</div>

{% endblock %}
