{% extends "base.html" %}
{% block content %}
{% if not orders %}
  <div class="alert alert-info">Belum ada pesanan.</div>
{% endif %}

{% for o in orders %}
<div class="card shadow-sm border-0 mb-3">
  <div class="card-body d-flex align-items-center">

    <!-- GAMBAR -->
    <div class="me-3">
      {% if o.gambar %}
        <img src="{{ o.gambar }}"
             style="width:70px;height:70px;object-fit:cover;border-radius:12px;">
      {% else %}
        <div style="width:70px;height:70px;background:#eee;border-radius:12px;
                    display:flex;align-items:center;justify-content:center;font-size:12px;">
          No Image
        </div>
      {% endif %}
    </div>

    <!-- INFO -->
    <div class="flex-grow-1">
      <strong>{{ o.nama_produk_utama }}</strong><br>
      <small class="text-muted">{{ o.tanggal }}</small><br>
      <span class="badge bg-secondary">{{ o.status_pesanan }}</span>
    </div>

    <!-- HARGA -->
    <div class="text-end">
  <strong class="d-block mb-2 fs-6">{{ o.total_harga | rupiah }}</strong>

  <a href="{{ url_for('pesanan_detail', id_order=o.id_order) }}"
     class="btn btn-primary btn-sm d-inline-flex align-items-center gap-1 rounded-3 shadow-sm">
    <i class="bi bi-receipt"></i>
    Detaill
  </a>
</div>



  </div>
</div>
{% endfor %}

{% endblock %}
